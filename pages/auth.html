<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập & Đăng Ký - FILMHAY</title>
    <link rel="stylesheet" href="../css/sign.css">
</head>
<body>

    <div class="page-overlay">
            <div class="header-logo">
            <a href="../index.html">
                <img src="../assets/logo/LOGO.png" alt="Logo">
            </a>
            </div>

        <div class="auth-box">
            <div id="signin-container">
                <h2>Chào mừng trở lại</h2>
                <form id="signin-form">
                    <div class="input-group">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        <input type="email" id="login-email" placeholder="Nhập Email" required>
                    </div>
                    <div class="input-group">
                        <svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                        <input type="password" id="login-password" placeholder="Nhập Mật Khẩu" required>
                    </div>
                    <button type="submit" class="btn-submit">Đăng Nhập</button>
                </form>
                <div class="toggle-text">
                    Chưa có tài khoản? <a href="javascript:void(0)" onclick="toggleAuth()">Đăng ký ngay</a>
                </div>
            </div>

            <div id="signup-container" style="display: none;">
                <h2>Tạo tài khoản</h2>
                <form id="signup-form">
                    <div class="input-group">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <input type="text" id="reg-user" placeholder="Tên đăng nhập" required>
                    </div>
                    <div class="input-group">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        <input type="email" id="reg-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <svg viewBox="0 0 24 24"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                        <input type="password" placeholder="Mật khẩu" required>
                    </div>
                    <button type="submit" class="btn-submit">Đăng Ký</button>
                </form>
                <div class="toggle-text">
                    Đã có tài khoản? <a href="javascript:void(0)" onclick="toggleAuth()">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth() {
            const loginBox = document.getElementById('signin-container');
            const signupBox = document.getElementById('signup-container');
            
            if (loginBox.style.display === 'none') {
                loginBox.style.display = 'block';
                signupBox.style.display = 'none';
            } else {
                loginBox.style.display = 'none';
                signupBox.style.display = 'block';
            }
        }
    </script>

    <script src="../js/global.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
